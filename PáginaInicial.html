<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa do Queijo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            color: #fff;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 35px 9%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            line-height: 20px;
            color: #fff;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 45px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
        }

        .btn {
            background: #f5b041;
            color: #000;
            padding: 10px 24px;
            border-radius: 25px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
                        url("queijo.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        .content {
            max-width: 800px;
        }

        .content h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 18px;
        }

        .content p {
            font-size: 24px;
            margin-bottom: 35px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-outline {
            border: 2px solid #fff;
            color: #fff;
            padding: 9px 28px;
            border-radius: 25px;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
        }

        .buttons .btn {
            text-decoration: none;
        }

        @media (max-width: 768px) {
            header {
                padding: 25px 6%;
                flex-direction: column;
                gap: 20px;
            }

            nav {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }

            nav a {
                font-size: 15px;
            }

            .content h1 {
                font-size: 32px;
            }

            .content p {
                font-size: 19px;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            casa do<br>queijo!
        </div>

        <nav>
            <a href="#">Sobre</a>
            <a href="#">Catálogo</a>
            <a href="#" class="btn">Contato</a>
        </nav>
    </header>

    <section class="hero">
        <div class="content">
            <h1>O MELHOR QUEIJO DA REGIÃO</h1>
            <p>Conheça o melhor distribuidor de<br>queijo do Sul de Minas</p>

            <div class="buttons">
                <a href="#" class="btn-outline">Sobre</a>
                <a href="#" class="btn">Catálogo</a>
            </div>
        </div>
    </section>

</body>
</html>
